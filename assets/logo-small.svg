<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="sm-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <radialGradient id="sm-cyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </radialGradient>
  </defs>

  <!-- Simplified C-shape from connected nodes -->
  <!-- Connections -->
  <g stroke="#00e5ff" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.8">
    <!-- C outer path -->
    <path d="M 20,4 Q 14,2 9,5"/>
    <path d="M 9,5 Q 4,8 3,14"/>
    <path d="M 3,14 L 3,20"/>
    <path d="M 3,20 Q 5,26 10,28"/>
    <path d="M 10,28 Q 16,30 21,28"/>
    <!-- Inner connections -->
    <path d="M 20,4 L 17,11" opacity="0.6"/>
    <path d="M 9,5 L 12,11" opacity="0.6"/>
    <path d="M 3,14 L 11,15" opacity="0.6"/>
    <path d="M 3,20 L 11,19" opacity="0.6"/>
    <path d="M 10,28 L 12,22" opacity="0.6"/>
    <path d="M 21,28 L 19,22" opacity="0.6"/>
    <!-- Central mesh -->
    <path d="M 17,11 L 12,11" opacity="0.5"/>
    <path d="M 12,11 L 11,15" opacity="0.5"/>
    <path d="M 11,15 L 11,19" opacity="0.5"/>
    <path d="M 11,19 L 12,22" opacity="0.5"/>
    <path d="M 12,22 L 19,22" opacity="0.5"/>
    <path d="M 17,11 L 22,13" opacity="0.5"/>
    <path d="M 22,13 L 23,17" opacity="0.5"/>
    <path d="M 23,17 L 22,21" opacity="0.5"/>
    <path d="M 22,21 L 19,22" opacity="0.5"/>
    <!-- Cross connections to center -->
    <path d="M 17,11 L 17,17" opacity="0.3"/>
    <path d="M 11,15 L 17,17" opacity="0.3"/>
    <path d="M 11,19 L 17,17" opacity="0.3"/>
    <path d="M 23,17 L 17,17" opacity="0.3"/>
  </g>

  <!-- Primary nodes (C shape) -->
  <circle cx="20" cy="4" r="2" fill="url(#sm-purple)"/>
  <circle cx="9" cy="5" r="1.8" fill="url(#sm-purple)"/>
  <circle cx="3" cy="14" r="2" fill="url(#sm-purple)"/>
  <circle cx="3" cy="20" r="2" fill="url(#sm-purple)"/>
  <circle cx="10" cy="28" r="1.8" fill="url(#sm-purple)"/>
  <circle cx="21" cy="28" r="2" fill="url(#sm-purple)"/>

  <!-- Secondary inner nodes -->
  <circle cx="17" cy="11" r="1.3" fill="url(#sm-cyan)"/>
  <circle cx="12" cy="11" r="1.2" fill="url(#sm-cyan)"/>
  <circle cx="11" cy="15" r="1.2" fill="url(#sm-cyan)"/>
  <circle cx="11" cy="19" r="1.2" fill="url(#sm-cyan)"/>
  <circle cx="12" cy="22" r="1.2" fill="url(#sm-cyan)"/>
  <circle cx="19" cy="22" r="1.3" fill="url(#sm-cyan)"/>
  <circle cx="22" cy="13" r="1.2" fill="url(#sm-cyan)"/>
  <circle cx="23" cy="17" r="1.2" fill="url(#sm-cyan)"/>
  <circle cx="22" cy="21" r="1.2" fill="url(#sm-cyan)"/>

  <!-- Central hub -->
  <circle cx="17" cy="17" r="2.2" fill="url(#sm-purple)"/>
  <circle cx="17" cy="17" r="1" fill="#00e5ff"/>
</svg>