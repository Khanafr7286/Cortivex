<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="dk-connectionGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="dk-nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="dk-whiteFlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f0f5" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#f0f0f5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#e0e0e8" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="dk-whiteNode" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#f0f0f5"/>
      <stop offset="100%" stop-color="#d4d4dc"/>
    </radialGradient>
    <radialGradient id="dk-lightNode" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8e8f0"/>
      <stop offset="100%" stop-color="#c8c8d4"/>
    </radialGradient>
    <linearGradient id="dk-ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f0f5" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#f0f0f5" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f0f0f5" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background circle (subtle) -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#dk-ringGrad)" stroke-width="1.5" stroke-dasharray="8,6"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#dk-ringGrad)" stroke-width="0.8" stroke-dasharray="4,8" opacity="0.5"/>

  <!-- Connections (white) -->
  <g filter="url(#dk-connectionGlow)" stroke="url(#dk-whiteFlow)" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M 310,105 Q 250,80 185,110" opacity="0.9"/>
    <path d="M 185,110 Q 120,145 105,210" opacity="0.9"/>
    <path d="M 105,210 L 100,300" opacity="0.9"/>
    <path d="M 100,300 Q 115,370 180,405" opacity="0.9"/>
    <path d="M 180,405 Q 245,435 315,410" opacity="0.9"/>
    <path d="M 310,105 L 260,175" opacity="0.7"/>
    <path d="M 185,110 L 200,185" opacity="0.7"/>
    <path d="M 105,210 L 185,230" opacity="0.7"/>
    <path d="M 100,300 L 180,290" opacity="0.7"/>
    <path d="M 180,405 L 195,330" opacity="0.7"/>
    <path d="M 315,410 L 290,340" opacity="0.7"/>
    <path d="M 260,175 L 200,185" opacity="0.6"/>
    <path d="M 200,185 L 185,230" opacity="0.6"/>
    <path d="M 185,230 L 180,290" opacity="0.6"/>
    <path d="M 180,290 L 195,330" opacity="0.6"/>
    <path d="M 195,330 L 290,340" opacity="0.6"/>
    <path d="M 260,175 L 330,200" opacity="0.6"/>
    <path d="M 330,200 L 350,260" opacity="0.6"/>
    <path d="M 350,260 L 340,320" opacity="0.6"/>
    <path d="M 340,320 L 290,340" opacity="0.6"/>
    <path d="M 260,175 L 275,260" opacity="0.4"/>
    <path d="M 200,185 L 275,260" opacity="0.4"/>
    <path d="M 185,230 L 275,260" opacity="0.4"/>
    <path d="M 275,260 L 350,260" opacity="0.4"/>
    <path d="M 275,260 L 290,340" opacity="0.4"/>
    <path d="M 275,260 L 195,330" opacity="0.4"/>
    <path d="M 275,260 L 180,290" opacity="0.4"/>
    <path d="M 330,200 L 310,105" opacity="0.5"/>
    <path d="M 340,320 L 315,410" opacity="0.5"/>
    <path d="M 200,185 L 180,290" opacity="0.3"/>
    <path d="M 260,175 L 340,320" opacity="0.3"/>
    <path d="M 330,200 L 195,330" opacity="0.3"/>
    <path d="M 185,230 L 290,340" opacity="0.3"/>
  </g>

  <!-- Primary nodes (white) -->
  <g filter="url(#dk-nodeGlow)">
    <circle cx="310" cy="105" r="12" fill="url(#dk-whiteNode)"/>
    <circle cx="185" cy="110" r="11" fill="url(#dk-whiteNode)"/>
    <circle cx="105" cy="210" r="13" fill="url(#dk-whiteNode)"/>
    <circle cx="100" cy="300" r="12" fill="url(#dk-whiteNode)"/>
    <circle cx="180" cy="405" r="11" fill="url(#dk-whiteNode)"/>
    <circle cx="315" cy="410" r="12" fill="url(#dk-whiteNode)"/>
  </g>

  <!-- Secondary nodes (light gray) -->
  <g filter="url(#dk-nodeGlow)">
    <circle cx="260" cy="175" r="9" fill="url(#dk-lightNode)"/>
    <circle cx="200" cy="185" r="8" fill="url(#dk-lightNode)"/>
    <circle cx="185" cy="230" r="8" fill="url(#dk-lightNode)"/>
    <circle cx="180" cy="290" r="8" fill="url(#dk-lightNode)"/>
    <circle cx="195" cy="330" r="8" fill="url(#dk-lightNode)"/>
    <circle cx="290" cy="340" r="9" fill="url(#dk-lightNode)"/>
    <circle cx="330" cy="200" r="8" fill="url(#dk-lightNode)"/>
    <circle cx="350" cy="260" r="8" fill="url(#dk-lightNode)"/>
    <circle cx="340" cy="320" r="8" fill="url(#dk-lightNode)"/>
  </g>

  <!-- Central hub -->
  <circle cx="275" cy="260" r="16" fill="url(#dk-whiteNode)" filter="url(#dk-nodeGlow)"/>
  <circle cx="275" cy="260" r="10" fill="none" stroke="#f0f0f5" stroke-width="1.5" opacity="0.8"/>
  <circle cx="275" cy="260" r="5" fill="#ffffff" opacity="0.9"/>
</svg>