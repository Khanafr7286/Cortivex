<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <filter id="wm-connectionGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="wm-nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="wm-cyanFlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#00e5ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.4"/>
    </linearGradient>
    <radialGradient id="wm-purpleNode" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="60%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </radialGradient>
    <radialGradient id="wm-cyanNode" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </radialGradient>
    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f0f0f5"/>
      <stop offset="40%" stop-color="#f0f0f5"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
  </defs>

  <!-- Logo mark (scaled down version of main logo) -->
  <g transform="translate(20, 10) scale(0.35)">
    <!-- Connections -->
    <g filter="url(#wm-connectionGlow)" stroke="url(#wm-cyanFlow)" stroke-width="2.5" fill="none" stroke-linecap="round">
      <path d="M 310,105 Q 250,80 185,110" opacity="0.9"/>
      <path d="M 185,110 Q 120,145 105,210" opacity="0.9"/>
      <path d="M 105,210 L 100,300" opacity="0.9"/>
      <path d="M 100,300 Q 115,370 180,405" opacity="0.9"/>
      <path d="M 180,405 Q 245,435 315,410" opacity="0.9"/>
      <path d="M 310,105 L 260,175" opacity="0.7"/>
      <path d="M 185,110 L 200,185" opacity="0.7"/>
      <path d="M 105,210 L 185,230" opacity="0.7"/>
      <path d="M 100,300 L 180,290" opacity="0.7"/>
      <path d="M 180,405 L 195,330" opacity="0.7"/>
      <path d="M 315,410 L 290,340" opacity="0.7"/>
      <path d="M 260,175 L 200,185" opacity="0.6"/>
      <path d="M 200,185 L 185,230" opacity="0.6"/>
      <path d="M 185,230 L 180,290" opacity="0.6"/>
      <path d="M 180,290 L 195,330" opacity="0.6"/>
      <path d="M 195,330 L 290,340" opacity="0.6"/>
      <path d="M 260,175 L 330,200" opacity="0.6"/>
      <path d="M 330,200 L 350,260" opacity="0.6"/>
      <path d="M 350,260 L 340,320" opacity="0.6"/>
      <path d="M 340,320 L 290,340" opacity="0.6"/>
      <path d="M 260,175 L 275,260" opacity="0.4"/>
      <path d="M 200,185 L 275,260" opacity="0.4"/>
      <path d="M 185,230 L 275,260" opacity="0.4"/>
      <path d="M 275,260 L 350,260" opacity="0.4"/>
      <path d="M 275,260 L 290,340" opacity="0.4"/>
      <path d="M 275,260 L 195,330" opacity="0.4"/>
      <path d="M 275,260 L 180,290" opacity="0.4"/>
      <path d="M 330,200 L 310,105" opacity="0.5"/>
      <path d="M 340,320 L 315,410" opacity="0.5"/>
    </g>
    <!-- Primary nodes -->
    <g filter="url(#wm-nodeGlow)">
      <circle cx="310" cy="105" r="14" fill="url(#wm-purpleNode)"/>
      <circle cx="185" cy="110" r="13" fill="url(#wm-purpleNode)"/>
      <circle cx="105" cy="210" r="15" fill="url(#wm-purpleNode)"/>
      <circle cx="100" cy="300" r="14" fill="url(#wm-purpleNode)"/>
      <circle cx="180" cy="405" r="13" fill="url(#wm-purpleNode)"/>
      <circle cx="315" cy="410" r="14" fill="url(#wm-purpleNode)"/>
    </g>
    <!-- Secondary nodes -->
    <g filter="url(#wm-nodeGlow)">
      <circle cx="260" cy="175" r="10" fill="url(#wm-cyanNode)"/>
      <circle cx="200" cy="185" r="9" fill="url(#wm-cyanNode)"/>
      <circle cx="185" cy="230" r="9" fill="url(#wm-cyanNode)"/>
      <circle cx="180" cy="290" r="9" fill="url(#wm-cyanNode)"/>
      <circle cx="195" cy="330" r="9" fill="url(#wm-cyanNode)"/>
      <circle cx="290" cy="340" r="10" fill="url(#wm-cyanNode)"/>
      <circle cx="330" cy="200" r="9" fill="url(#wm-cyanNode)"/>
      <circle cx="350" cy="260" r="9" fill="url(#wm-cyanNode)"/>
      <circle cx="340" cy="320" r="9" fill="url(#wm-cyanNode)"/>
    </g>
    <!-- Central hub -->
    <circle cx="275" cy="260" r="18" fill="url(#wm-purpleNode)" filter="url(#wm-nodeGlow)"/>
    <circle cx="275" cy="260" r="11" fill="none" stroke="#00e5ff" stroke-width="2" opacity="0.8"/>
    <circle cx="275" cy="260" r="6" fill="#00e5ff" opacity="0.9"/>
    <!-- Node highlights -->
    <g fill="#f0f0f5" opacity="0.8">
      <circle cx="310" cy="105" r="3.5"/>
      <circle cx="185" cy="110" r="3"/>
      <circle cx="105" cy="210" r="3.5"/>
      <circle cx="100" cy="300" r="3.5"/>
      <circle cx="180" cy="405" r="3"/>
      <circle cx="315" cy="410" r="3.5"/>
    </g>
  </g>

  <!-- Wordmark text -->
  <text x="230" y="118" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif" font-weight="700" font-size="72" letter-spacing="8" fill="url(#textGrad)">CORTIVEX</text>

  <!-- Subtle tagline -->
  <text x="232" y="148" font-family="'Inter', 'Segoe UI', -apple-system, sans-serif" font-weight="400" font-size="14" letter-spacing="5" fill="#6b7280">VISUAL AI AGENT PIPELINES</text>
</svg>