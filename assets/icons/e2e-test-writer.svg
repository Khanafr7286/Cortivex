<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#1f6feb" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Browser window -->
  <rect x="2" y="3" width="20" height="18" rx="2"/>
  <!-- Browser bar -->
  <line x1="2" y1="8" x2="22" y2="8"/>
  <!-- Browser dots -->
  <circle cx="5" cy="5.5" r="0.8" fill="none"/>
  <circle cx="8" cy="5.5" r="0.8" fill="none"/>
  <circle cx="11" cy="5.5" r="0.8" fill="none"/>
  <!-- Checkmarks inside browser -->
  <polyline points="7,12 9,14 13,10"/>
  <polyline points="7,16 9,18 13,14"/>
  <!-- Check indicator -->
  <circle cx="18" cy="14" r="3" opacity="0.6"/>
  <polyline points="16.5,14 17.5,15 19.5,13" opacity="0.6"/>
</svg>