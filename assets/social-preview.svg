<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a14"/>
    </radialGradient>
    <radialGradient id="logo-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4aa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg-glow)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#00d4aa">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Mesh network nodes (background decoration) -->
  <g opacity="0.15">
    <circle cx="200" cy="150" r="3" fill="#00d4aa"/>
    <circle cx="350" cy="100" r="2" fill="#7b61ff"/>
    <circle cx="180" cy="300" r="2.5" fill="#00d4aa"/>
    <circle cx="1080" cy="180" r="3" fill="#7b61ff"/>
    <circle cx="1100" cy="350" r="2" fill="#00d4aa"/>
    <circle cx="950" cy="120" r="2.5" fill="#00d4aa"/>
    <circle cx="150" cy="500" r="2" fill="#7b61ff"/>
    <circle cx="1150" cy="520" r="2.5" fill="#00d4aa"/>
    <line x1="200" y1="150" x2="350" y2="100" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="200" y1="150" x2="180" y2="300" stroke="#00d4aa" stroke-width="0.5"/>
    <line x1="1080" y1="180" x2="1100" y2="350" stroke="#7b61ff" stroke-width="0.5"/>
    <line x1="1080" y1="180" x2="950" y2="120" stroke="#00d4aa" stroke-width="0.5"/>
  </g>

  <!-- Central mesh logo -->
  <g transform="translate(640, 220)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="80" fill="url(#logo-glow)"/>

    <!-- Mesh triangle structure -->
    <g stroke="#00d4aa" stroke-width="1.5" fill="none" opacity="0.6">
      <polygon points="0,-50 43,25 -43,25"/>
      <polygon points="0,-35 30,17 -30,17"/>
    </g>

    <!-- Nodes on the mesh -->
    <circle cx="0" cy="-50" r="5" fill="#00d4aa"/>
    <circle cx="43" cy="25" r="5" fill="#00d4aa"/>
    <circle cx="-43" cy="25" r="5" fill="#00d4aa"/>
    <circle cx="0" cy="-35" r="3.5" fill="#7b61ff"/>
    <circle cx="30" cy="17" r="3.5" fill="#7b61ff"/>
    <circle cx="-30" cy="17" r="3.5" fill="#7b61ff"/>
    <circle cx="0" cy="5" r="4" fill="#00d4aa"/>

    <!-- Connection lines -->
    <g stroke="#00d4aa" stroke-width="0.8" opacity="0.4">
      <line x1="0" y1="-50" x2="30" y2="17"/>
      <line x1="0" y1="-50" x2="-30" y2="17"/>
      <line x1="43" y1="25" x2="-30" y2="17"/>
      <line x1="-43" y1="25" x2="30" y2="17"/>
      <line x1="0" y1="5" x2="0" y2="-35"/>
      <line x1="0" y1="5" x2="30" y2="17"/>
      <line x1="0" y1="5" x2="-30" y2="17"/>
    </g>
  </g>

  <!-- CORTIVEX title -->
  <text x="640" y="340" text-anchor="middle" fill="#e0e0e0" font-family="'Segoe UI', Arial, sans-serif" font-size="56" font-weight="300" letter-spacing="18">CORTIVEX</text>

  <!-- Tagline -->
  <text x="640" y="390" text-anchor="middle" fill="#8a8a9a" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="300" letter-spacing="2">Build, Run &amp; Evolve AI Agent Pipelines</text>

  <!-- Feature pills -->
  <g transform="translate(640, 440)">
    <!-- Self-Learning -->
    <rect x="-310" y="-14" width="150" height="28" rx="14" fill="none" stroke="#00d4aa" stroke-width="0.8" opacity="0.5"/>
    <text x="-235" y="5" text-anchor="middle" fill="#00d4aa" font-family="'Segoe UI', Arial, sans-serif" font-size="11" letter-spacing="2" opacity="0.8">SELF-LEARNING</text>

    <!-- Mesh Coordination -->
    <rect x="-75" y="-14" width="150" height="28" rx="14" fill="none" stroke="#7b61ff" stroke-width="0.8" opacity="0.5"/>
    <text x="0" y="5" text-anchor="middle" fill="#7b61ff" font-family="'Segoe UI', Arial, sans-serif" font-size="11" letter-spacing="2" opacity="0.8">MESH COORD</text>

    <!-- Claude Code Skills -->
    <rect x="160" y="-14" width="150" height="28" rx="14" fill="none" stroke="#00d4aa" stroke-width="0.8" opacity="0.5"/>
    <text x="235" y="5" text-anchor="middle" fill="#00d4aa" font-family="'Segoe UI', Arial, sans-serif" font-size="11" letter-spacing="2" opacity="0.8">CLAUDE SKILLS</text>
  </g>

  <!-- Bottom stats bar -->
  <g transform="translate(640, 540)">
    <text x="-300" y="0" text-anchor="middle" fill="#555" font-family="'Segoe UI', Arial, sans-serif" font-size="12" letter-spacing="1">10 SKILLS</text>
    <text x="-150" y="0" text-anchor="middle" fill="#555" font-family="'Segoe UI', Arial, sans-serif" font-size="12" letter-spacing="1">20+ AGENTS</text>
    <text x="0" y="0" text-anchor="middle" fill="#555" font-family="'Segoe UI', Arial, sans-serif" font-size="12" letter-spacing="1">15 TEMPLATES</text>
    <text x="150" y="0" text-anchor="middle" fill="#555" font-family="'Segoe UI', Arial, sans-serif" font-size="12" letter-spacing="1">TYPESCRIPT</text>
    <text x="300" y="0" text-anchor="middle" fill="#555" font-family="'Segoe UI', Arial, sans-serif" font-size="12" letter-spacing="1">MIT LICENSE</text>
  </g>
</svg>
