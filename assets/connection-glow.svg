<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 20" width="100" height="20">
  <defs>
    <!-- Main connection gradient -->
    <linearGradient id="connGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="15%" stop-color="#00e5ff" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#00e5ff" stop-opacity="1"/>
      <stop offset="85%" stop-color="#00e5ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>
    <!-- Glow blur -->
    <filter id="connGlow" x="-10%" y="-100%" width="120%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Outer glow line -->
  <line x1="0" y1="10" x2="100" y2="10" stroke="url(#connGrad)" stroke-width="6" opacity="0.3" filter="url(#connGlow)"/>
  <!-- Core connection line -->
  <line x1="0" y1="10" x2="100" y2="10" stroke="url(#connGrad)" stroke-width="2" stroke-linecap="round"/>
  <!-- Bright center highlight -->
  <line x1="30" y1="10" x2="70" y2="10" stroke="#00e5ff" stroke-width="1" opacity="0.8"/>
</svg>