# =============================================================================
# Cortivex - Agent Configuration
# =============================================================================
# AI agent pipeline orchestration with Claude Code skills.
# Documentation: https://github.com/AhmedRaoofuddin/Cortivex
# =============================================================================

# =============================================================================
# Core Settings
# =============================================================================

model = "claude-sonnet-4"

approval_policy = "on-request"

sandbox_mode = "workspace-write"

# =============================================================================
# Project Documentation
# =============================================================================

project_doc_max_bytes = 65536

project_doc_fallback_filenames = [
  "CLAUDE.md",
  "AGENTS.md",
]

# =============================================================================
# Features
# =============================================================================

[features]
child_agents_md = true
shell_snapshot = true
request_rule = true

# =============================================================================
# MCP Servers
# =============================================================================

[mcp_servers.cortivex]
command = "node"
args = ["packages/mcp-server/dist/index.js"]
enabled = true
tool_timeout_sec = 120

# =============================================================================
# Skills Configuration
# =============================================================================

[[skills.config]]
path = ".agents/skills/cortivex-pipeline"
enabled = true

[[skills.config]]
path = ".agents/skills/cortivex-nodes"
enabled = true

[[skills.config]]
path = ".agents/skills/cortivex-templates"
enabled = true

[[skills.config]]
path = ".agents/skills/cortivex-task-decomposition"
enabled = true

[[skills.config]]
path = ".agents/skills/cortivex-learn"
enabled = true

[[skills.config]]
path = ".agents/skills/cortivex-mesh"
enabled = true

[[skills.config]]
path = ".agents/skills/cortivex-mesh-coordination"
enabled = true

[[skills.config]]
path = ".agents/skills/cortivex-orchestration"
enabled = true

[[skills.config]]
path = ".agents/skills/cortivex-consensus"
enabled = true

[[skills.config]]
path = ".agents/skills/cortivex-knowledge"
enabled = true

[[skills.config]]
path = ".agents/skills/cortivex-pipeline-debugger"
enabled = true

[[skills.config]]
path = ".agents/skills/cortivex-context-compression"
enabled = true

[[skills.config]]
path = ".agents/skills/cortivex-drift-detection"
enabled = true

[[skills.config]]
path = ".agents/skills/cortivex-agent-replay"
enabled = true

[[skills.config]]
path = ".agents/skills/cortivex-cross-repo"
enabled = true

# =============================================================================
# Profiles
# =============================================================================

[profiles.dev]
approval_policy = "never"
sandbox_mode = "danger-full-access"
# WARNING: This profile has dangerous settings. Only use for development!
# Ensure NODE_ENV=development and never use in production
# Configuration validation will prevent this profile from being used in production

[profiles.safe]
approval_policy = "untrusted"
sandbox_mode = "read-only"

[profiles.ci]
approval_policy = "never"
sandbox_mode = "workspace-write"

# =============================================================================
# Pipeline Execution
# =============================================================================

[pipeline]
max_parallelism = 4
default_model = "claude-sonnet-4"
cost_model = "claude-sonnet-4"
retry_strategy = "exponential"
max_retries = 2

# =============================================================================
# Mesh Coordination
# =============================================================================

[mesh]
claim_ttl_seconds = 300
conflict_strategy = "priority"
deadlock_detection = true
stale_threshold_seconds = 1800

# =============================================================================
# Learning Engine
# =============================================================================

[learning]
enabled = true
auto_apply_threshold = 0.80
decay_rate = 0.05
archive_threshold = 0.20
max_insights = 100

# =============================================================================
# Swarm Orchestration
# =============================================================================

[swarm]
default_pool_size = 5
max_agents = 10
heartbeat_interval_seconds = 90
auto_respawn = true
token_rotation_threshold = 95000
consensus = "raft"

# =============================================================================
# Security
# =============================================================================

[security]
input_validation = true
path_traversal_prevention = true
secret_scanning = true
max_file_size = 10485760
blocked_patterns = ["\\.env$", "credentials\\.json$", "\\.pem$", "\\.key$"]

# =============================================================================
# Performance
# =============================================================================

[performance]
task_timeout = 300
cache_enabled = true
cache_ttl = 3600
